<!doctype html>
<html lang="en">
<head>
    <title>Login 01</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="ftco-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5">
                    <div class="login-wrap p-4 p-md-5">
                        <div class="icon d-flex align-items-center justify-content-center">
                            <span class="fa fa-user-o"></span>
                        </div>
                        <h3 class="text-center mb-4">Sign In</h3>

                        <div id="errorMessage" class="alert alert-danger" style="display: none; text-align: center;"></div>

                        <form id="loginForm" class="login-form">
                            <div class="form-group">
                                <input type="text" id="username" class="form-control rounded-left" placeholder="Username" required>
                            </div>
                            <div class="form-group d-flex">
                                <input type="password" id="password" class="form-control rounded-left" placeholder="Password" required>
                            </div>
                            <div class="form-group">
                                <button type="submit" class="form-control btn btn-primary rounded submit px-3">Login</button>
                            </div>

                            <div class="form-group d-md-flex">
                                <div class="w-50">
                                    <label class="checkbox-wrap checkbox-primary">Remember Me
                                        <input type="checkbox" checked>
                                        <span class="checkmark"></span>
                                    </label>
                                </div>
                                <div class="w-50 text-md-right">
                                    <a href="#">Forgot Password</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/jquery.min.js"></script>
    <script src="js/popper.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        (function () {
            const cachedUser = localStorage.getItem('loggedInUser');
            if (cachedUser) {
                window.location.href = '/dashboard';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // Ngăn chặn form tải lại trang
            event.preventDefault();

            // Lấy dữ liệu và thẻ lỗi
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            // Ẩn lỗi cũ đi (nếu có)
            errorDiv.style.display = 'none';

            // Gói dữ liệu
            const loginData = {
                username: usernameInput,
                password: passwordInput
            };

            // Gọi API
            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            })
            .then(async response => {
                const data = await response.json();

                if (response.ok) {
                    // Lưu thông tin user
                    localStorage.setItem('loggedInUser', JSON.stringify(data));
                    alert('Đăng nhập thành công! Xin chào ' + data.fullName);

                    // FIX: Bỏ đuôi .html đi, gọi vào URL của DashboardController
                    window.location.href = '/dashboard';
                } else {
                    // Thất bại: Hiện lỗi lên bằng class alert của Bootstrap
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                errorDiv.innerText = 'Không thể kết nối đến máy chủ!';
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>
