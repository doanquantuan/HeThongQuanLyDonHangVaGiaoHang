<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>
<body>

<div th:replace="~{fragments/layout :: main('Tổng quan - DeliveryMgr', ~{::div.content})}">

  <div class="content">
    <div class="page-hd">
      <div>
        <div class="page-eyebrow">DASHBOARD</div>
        <h1 class="page-title">Tổng quan hệ thống</h1>
        <div class="page-sub">Xem nhanh tình trạng đơn hàng và giao hàng hôm nay.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-default">📅 Lọc theo ngày</button>
        <button class="btn btn-primary" onclick="showToast('Tính năng đang phát triển!', 'success')">
          + Tạo đơn hàng mới
        </button>
      </div>
    </div>

    <div class="card card-p">
      <div class="sec-hd">
        <div class="sec-title">THÔNG BÁO</div>
      </div>
      <p style="color: var(--text-2);">Giao diện đã tích hợp CSS thành công! Hãy sẵn sàng cho Task OR-60.</p>
      <br>
      <span class="badge badge-green">Hoạt động bình thường</span>
    </div>
  </div>

</div>

</body>
</html>
